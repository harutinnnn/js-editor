<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rich Text Editor Demo</title>
    <link rel="stylesheet" href="src/rich-text-editor.css">
</head>
<body>
<main>
    <h1>Block content editor</h1>
    <form id="article-form">

      <textarea id="article-body" name="body"></textarea>
        <button type="submit">Save article</button>
    </form>
</main>

<script src="src/rich-text-editor.js"></script>
<script>

    const baseUrl = "http://cq-new.local/";

    const editor = RichTextEditor.create("article-body", {
        placeholder: "Write your article here…",
        imageUploadUrl: baseUrl + "upload.php",
    });



    document.getElementById("article-form").addEventListener("submit", function (event) {
        event.preventDefault();
        alert(document.getElementById("article-body").value);
        console.log((document.getElementById("article-body").value))

        save(document.getElementById("article-body").value)
    });


    function save(text) {

        fetch(baseUrl + 'save_data.php', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                text: text
            })
        })
            .then(res => res.json())
            .then(data => console.log(data))
            .catch(err => console.error(err));

    }

    fetch(baseUrl + 'save_data.php', {
        method: "GET",
        headers: {
            "Content-Type": "application/json"
        },

    })
        .then(res => res.json())
        .then(data => {
            editor.setData(data)
        })
        .catch(err => console.error(err));

</script>
</body>
</html>
